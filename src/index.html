<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Middleware Security Analysis</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; }
        .box { border: 2px solid #444; padding: 20px; margin: 20px; border-radius: 12px; display: inline-block; width: 280px; }
        .red { border-top: 6px solid #ff4444; background: #2d1a1a; }
        .green { border-top: 6px solid #00c851; background: #1a2d1a; }
    </style>
</head>
<body>
    <h1>Kübra Fison - Vize Projesi (L5)</h1>
    <div class="box red"><h2>Vulnerable</h2><p>İşlem -> Auth<br>(Hatalı Sıralama)</p></div>
    <div class="box green"><h2>Secure</h2><p>Auth -> İşlem<br>(Doğru Sıralama)</p></div>
</body>
</html>
